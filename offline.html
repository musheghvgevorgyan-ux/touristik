<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Touristik Travel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f2027 0%, #203a43 50%, #2c5364 100%);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .offline-container {
            text-align: center;
            padding: 2rem;
            max-width: 480px;
        }
        .offline-icon {
            font-size: 5rem;
            margin-bottom: 1.5rem;
            animation: floatIcon 3s ease-in-out infinite;
        }
        @keyframes floatIcon {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, #f18f01, #ffc107);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        p {
            color: #aab;
            line-height: 1.7;
            margin-bottom: 2rem;
            font-size: 1.05rem;
        }
        .btn {
            display: inline-block;
            padding: 0.8rem 2rem;
            background: linear-gradient(135deg, #f18f01, #e67e00);
            color: #fff;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(241, 143, 1, 0.35);
        }
        .plane {
            display: inline-block;
            animation: flyPlane 4s ease-in-out infinite;
        }
        @keyframes flyPlane {
            0%, 100% { transform: translateX(0) rotate(0deg); }
            25% { transform: translateX(15px) rotate(5deg); }
            75% { transform: translateX(-15px) rotate(-5deg); }
        }
        .dots {
            margin-top: 2rem;
            display: flex;
            justify-content: center;
            gap: 0.5rem;
        }
        .dots span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #f18f01;
            opacity: 0.3;
            animation: pulse 1.5s ease-in-out infinite;
        }
        .dots span:nth-child(2) { animation-delay: 0.3s; }
        .dots span:nth-child(3) { animation-delay: 0.6s; }
        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.3); }
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon"><span class="plane">&#9992;</span></div>
        <h1>You're Offline</h1>
        <p>It looks like you've lost your internet connection. Don't worry — check your connection and try again. Your travel plans will be waiting!</p>
        <button class="btn" onclick="window.location.reload()">Try Again</button>
        <div class="dots">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </div>
</body>
</html>
